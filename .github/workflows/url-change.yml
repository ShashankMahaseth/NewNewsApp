name: Update APK Download URL

on:
  workflow_run:
    workflows: ["Release Signed Artifacts"]
    types:
      - completed

permissions:
  contents: write

jobs:
  update-url:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install jq

      - name: Get latest APK URL
        id: release
        run: |
          url=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest \
          | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url')

          echo "apk_url=$url" >> $GITHUB_OUTPUT

      - name: Update download link
        run: |
          sed -i "s|https://github.com/.*/releases/download/.*/NewNews-.*\.apk|${{ steps.release.outputs.apk_url }}|g" docs/index.html

      - name: Commit change
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add docs/index.html
          git commit -m "Update APK download URL"
          git push
